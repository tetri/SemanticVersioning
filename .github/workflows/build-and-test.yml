name: Build and Test

on: [push, pull_request]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate conventional commits
        if: github.event_name == 'pull_request'
        run: |
          echo "Validating commit messages for conventional commit format..."
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git log "$base..$head" --format="%s" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/-]+\))?!?: .+|^Merge .+|^Revert .+'; then
            echo "❌ Some commits do not follow conventional commit format!"
            echo ""
            echo "Expected format: type(optional-scope): description"
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo ""
            echo "Offending commits:"
            git log "$base..$head" --format="%h %s" | while read line; do
              if ! echo "$line" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/-]+\))?!?: .+|^Merge .+|^Revert .+'; then
                echo "  ✗ $line"
              fi
            done
            exit 1
          fi
          echo "✅ All commits follow conventional commit format."

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Test with Coverage
        run: dotnet test --collect:"XPlat Code Coverage" --settings .github/coverlet.runsettings
